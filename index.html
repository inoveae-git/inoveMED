<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Voz Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; 
            --success: #22c55e; --danger: #ef4444; --text: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .dashboard { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            text-align: center; margin-bottom: 20px; border: 1px solid #334155;
        }
        
        .status-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        
        /* LED Indicador */
        .led { width: 25px; height: 25px; border-radius: 50%; background: #334155; transition: 0.3s; border: 2px solid #000; }
        .led.active { background: var(--success); box-shadow: 0 0 20px var(--success); }
        .led.listening { background: var(--primary); box-shadow: 0 0 20px var(--primary); animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .display-numero { 
            font-family: 'Digital-7', monospace, sans-serif; font-size: 3rem; 
            color: var(--success); background: #000; padding: 10px 30px; 
            border-radius: 8px; border: 2px solid #334155; min-width: 140px;
            text-shadow: 0 0 10px var(--success);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { 
            padding: 18px; border: none; border-radius: 12px; color: white; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem;
        }
        .btn-voz { background: var(--primary); grid-column: span 2; box-shadow: 0 4px 0 #1d4ed8; }
        .btn-voz:active { transform: translateY(4px); box-shadow: none; }
        .btn-pdf { background: var(--success); }
        .btn-reset { background: var(--danger); }

        .grid-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .table-wrapper { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            min-width: 240px; border: 1px solid #334155;
        }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border-bottom: 1px solid #334155; padding: 12px; text-align: center; }
        th { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; }
        .soma-parcial { background: rgba(34, 197, 94, 0.1); color: var(--success); padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; }
        
        .total-final { 
            background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; 
            border-radius: 15px; text-align: center; font-size: 1.8rem; 
            margin-top: 30px; border: 2px solid var(--primary); font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <h2>PAINEL DE CAPTURA</h2>
        <div class="status-container">
            <div id="led" class="led"></div>
            <div id="display" class="display-numero">---</div>
        </div>
        <p id="info-status">Clique abaixo para falar</p>
    </div>

    <div class="controls">
        <button class="btn-voz" id="btnVoz">🎤 INICIAR ESCUTA</button>
        <button class="btn-pdf" onclick="gerarPDF()">📄 BAIXAR PDF</button>
        <button class="btn-reset" onclick="reiniciar()">🔄 REINICIAR</button>
    </div>

    <div id="tabelas-container" class="grid-container"></div>

    <div id="total-area" style="display:none;">
        <div class="total-final">
            TOTAL GERAL: <span id="soma-total" style="color:var(--primary)">0</span>
        </div>
    </div>
</div>

<script>
    let numeros = [];
    const led = document.getElementById('led');
    const display = document.getElementById('display');
    const statusTxt = document.getElementById('info-status');
    const btnVoz = document.getElementById('btnVoz');

    // Configuração de Reconhecimento de Voz
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        statusTxt.innerText = "Erro: Navegador não suporta voz.";
        btnVoz.style.background = "#444";
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.interimResults = false;
        recognition.continuous = false;

        btnVoz.addEventListener('click', () => {
            try {
                recognition.start();
                led.className = 'led listening';
                statusTxt.innerText = "Ouvindo agora...";
            } catch (e) {
                console.log("Reconhecimento já ativo");
            }
        });

        recognition.onresult = (event) => {
            const transcricao = event.results[0][0].transcript;
            const valorLimpo = transcricao.replace(',', '.').replace(/[^\d.-]/g, '');
            const num = parseFloat(valorLimpo);

            if (!isNaN(num)) {
                numeros.push(num);
                display.innerText = num;
                led.className = 'led active';
                setTimeout(() => { if(led.className !== 'led listening') led.className = 'led'; }, 1000);
                renderizar();
            } else {
                statusTxt.innerText = "Número não identificado.";
            }
        };

        recognition.onerror = (event) => {
            led.className = 'led';
            if(event.error === 'not-allowed') {
                statusTxt.innerHTML = "<b style='color:red'>ERRO: Ative o HTTPS ou permita o microfone!</b>";
            }
        };

        recognition.onend = () => {
            if(led.className === 'listening') led.className = 'led';
            statusTxt.innerText = "Clique para falar novamente";
        };
    }

    function renderizar() {
        const container = document.getElementById('tabelas-container');
        container.innerHTML = '';
        let totalAcumulado = 0;

        for (let i = 0; i < numeros.length; i += 10) {
            const grupo = numeros.slice(i, i + 10);
            const div = document.createElement('div');
            div.className = 'table-wrapper';
            
            let tabela = `<table><tr><th>ID</th><th>VALOR</th></tr>`;
            let subtotal = 0;
            
            grupo.forEach((val, idx) => {
                tabela += `<tr><td>#${i + idx + 1}</td><td>${val.toLocaleString('pt-BR')}</td></tr>`;
                subtotal += val;
            });
            
            tabela += `</table><div class="soma-parcial">SUBTOTAL: ${subtotal.toLocaleString('pt-BR')}</div>`;
            div.innerHTML = tabela;
            container.appendChild(div);
            totalAcumulado += subtotal;
        }

        if(numeros.length > 0) {
            document.getElementById('total-area').style.display = 'block';
            document.getElementById('soma-total').innerText = totalAcumulado.toLocaleString('pt-BR');
        }
    }

    function gerarPDF() {
        if(numeros.length === 0) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let total = 0;

        doc.setFontSize(22);
        doc.text("Relatório de Soma por Voz", 14, 20);
        doc.setFontSize(12);
        doc.text("Gerado em: " + new Date().toLocaleString(), 14, 28);

        for (let i = 0; i < numeros.length; i += 10) {
            const grupo = numeros.slice(i, i + 10);
            const body = grupo.map((n, idx) => [i + idx + 1, n.toLocaleString('pt-BR')]);
            const sub = grupo.reduce((a, b) => a + b, 0);
            total += sub;

            doc.autoTable({
                startY: i === 0 ? 35 : doc.lastAutoTable.finalY + 10,
                head: [['Ordem', 'Valor Falado']],
                body: body,
                foot: [['SOMA DO GRUPO', sub.toLocaleString('pt-BR')]],
                theme: 'grid',
                headStyles: { fillColor: [59, 130, 246] },
                footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' }
            });
        }

        doc.setFontSize(16);
        doc.text(`VALOR TOTAL ACUMULADO: ${total.toLocaleString('pt-BR')}`, 14, doc.lastAutoTable.finalY + 15);
        doc.save("relatorio-voz.pdf");
    }

    function reiniciar() {
        if(confirm("Limpar todos os dados?")) {
            numeros = [];
            display.innerText = "---";
            document.getElementById('total-area').style.display = 'none';
            renderizar();
        }
    }
</script>
</body>
</html>
